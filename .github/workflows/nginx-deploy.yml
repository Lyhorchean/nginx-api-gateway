name: Simple CI/CD for NGINX API Gateway
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      # Build and push NGINX image
      - name: Build and push NGINX
        run: |
          docker build -t lyhor/nginx-api-gateway:latest .
          docker push lyhor/nginx-api-gateway:latest
      
      # Build and push Mockoon image
      - name: Build and push Mockoon
        run: |
          docker build -t lyhor/mockoon-services:latest ./mockoon-container
          docker push lyhor/mockoon-services:latest
